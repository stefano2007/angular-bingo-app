<div class="min-h-screen flex flex-col p-4 md:p-8">
  <header class="text-center mb-8 text-white dark:text-gray-100 relative">
    <button
      (click)="alternarTema()"
      class="absolute top-0 right-0 md:top-4 md:right-4 p-2 rounded-lg bg-white/20 dark:bg-gray-800/50 hover:bg-white/30 dark:hover:bg-gray-700/50 transition-colors backdrop-blur-sm"
      type="button"
      [attr.aria-label]="temaEscuro ? 'Alternar para tema claro' : 'Alternar para tema escuro'"
    >
      @if (temaEscuro) {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
        </svg>
      } @else {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
      }
    </button>
    <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold m-0 mb-2 drop-shadow-lg">🎲 Bingo App</h1>
    <p class="text-lg md:text-xl m-0 opacity-90">Jogo de Bingo Interativo</p>
  </header>

  <main class="flex-1 flex flex-col gap-6 md:gap-8 max-w-7xl w-full mx-auto">
    <app-bingo-controls
      [numeroMaximo]="estadoJogo().numeroMaximo"
      [numeroAtual]="estadoJogo().numeroAtual"
      [quantidadeSelecionados]="estadoJogo().numerosSelecionados.length"
      [totalNumeros]="estadoJogo().numeroMaximo"
      [numeroMaximoSelecionado]="numeroMaximoEmModal()"
      (novoJogo)="aoNovoJogo($event)"
      (gerarNumero)="aoGerarNumero()"
    ></app-bingo-controls>

    <app-numbers-scoreboard
      [numerosSelecionados]="estadoJogo().numerosSelecionados"
    ></app-numbers-scoreboard>

    <app-bingo-board
      [numeros]="estadoJogo().numeros"
      [numerosSelecionados]="estadoJogo().numerosSelecionados"
    ></app-bingo-board>
  </main>

  <!-- Modal para novo jogo -->
  @if (mostrarModalNovoJogo()) {
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
      <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl p-6 max-w-md w-full">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-4">Iniciar Novo Jogo</h2>
        <p class="text-gray-600 dark:text-gray-400 mb-6">Escolha o número máximo para o novo jogo:</p>
        
        <div class="flex flex-col gap-2 mb-6">
          <label for="numeroMaximoModal" class="text-sm font-medium text-gray-700 dark:text-gray-300">Número Máximo:</label>
          <select 
            id="numeroMaximoModal" 
            [ngModel]="numeroMaximoEmModal()"
            (ngModelChange)="numeroMaximoEmModal.set($event)"
            class="p-3 border-2 border-gray-200 dark:border-gray-600 rounded-lg text-base bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 cursor-pointer transition-colors hover:border-gray-400 dark:hover:border-gray-500 focus:outline-none focus:border-indigo-500 dark:focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 dark:focus:ring-indigo-800"
          >
            <option [value]="75">75</option>
            <option [value]="80">80</option>
            <option [value]="85">85</option>
            <option [value]="90">90</option>
            <option [value]="95">95</option>
            <option [value]="100">100</option>
            <option [value]="105">105</option>
            <option [value]="110">110</option>
            <option [value]="115">115</option>
            <option [value]="120">120</option>
          </select>
        </div>

        <div class="flex gap-3">
          <button
            (click)="cancelarModalNovoJogo()"
            class="flex-1 px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-lg text-base font-semibold cursor-pointer transition-all bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 hover:bg-gray-50 dark:hover:bg-gray-600"
            type="button"
          >
            Cancelar
          </button>
          <button
            (click)="confirmarNovoJogoModal(numeroMaximoEmModal())"
            class="flex-1 px-4 py-3 border-none rounded-lg text-base font-semibold cursor-pointer transition-all shadow-md bg-linear-to-br from-indigo-500 to-purple-600 dark:from-indigo-600 dark:to-purple-700 text-white hover:-translate-y-0.5 hover:shadow-lg"
            type="button"
          >
            Confirmar
          </button>
        </div>
      </div>
    </div>
  }
</div>
