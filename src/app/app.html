<div class="min-h-screen flex flex-col p-4 md:p-8">
  <header class="text-center mb-8 text-white">
    <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold m-0 mb-2 drop-shadow-lg">🎲 Bingo App</h1>
    <p class="text-lg md:text-xl m-0 opacity-90">Jogo de Bingo Interativo</p>
  </header>

  <main class="flex-1 flex flex-col gap-6 md:gap-8 max-w-7xl w-full mx-auto">
    <app-bingo-controls
      [maxNumber]="gameState().maxNumber"
      [currentNumber]="gameState().currentNumber"
      [selectedCount]="gameState().selectedNumbers.length"
      [totalNumbers]="gameState().maxNumber"
      (newGame)="onNewGame($event)"
      (generateNumber)="onGenerateNumber()"
      (saveGame)="onSaveGame()"
    ></app-bingo-controls>

    <app-bingo-board
      [numbers]="gameState().numbers"
      [selectedNumbers]="gameState().selectedNumbers"
    ></app-bingo-board>
  </main>
</div>
