<div class="flex flex-col gap-6 w-full max-w-2xl mx-auto p-4 md:p-6 bg-white rounded-xl shadow-lg">
  <div class="flex justify-between items-center flex-wrap gap-4">
    <h2 class="m-0 text-2xl font-semibold text-gray-900">Controles do Jogo</h2>
    @if (currentNumber !== null) {
      <div class="flex items-center gap-2 px-4 md:px-6 py-3 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg text-white font-semibold shadow-md">
        <span class="text-sm opacity-90">Número Atual:</span>
        <span class="text-2xl font-bold">{{ currentNumber }}</span>
      </div>
    }
  </div>

  <div class="flex flex-col gap-2">
    <div class="flex justify-between items-center text-sm text-gray-600">
      <span>Progresso: {{ selectedCount }} / {{ totalNumbers }}</span>
      <span class="font-semibold text-gray-700">{{ progressPercentage }}%</span>
    </div>
    <div class="w-full h-4 bg-gray-200 rounded-full overflow-hidden">
      <div 
        class="h-full bg-gradient-to-r from-green-500 to-green-600 transition-all duration-300 rounded-full"
        [style.width.%]="progressPercentage"
      ></div>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="flex flex-col gap-2 md:col-span-2">
      <label for="maxNumber" class="text-sm font-medium text-gray-700">Número Máximo (Novo Jogo):</label>
      <select 
        id="maxNumber" 
        [(ngModel)]="newMaxNumber"
        class="p-3 border-2 border-gray-200 rounded-lg text-base bg-white text-gray-900 cursor-pointer transition-colors hover:border-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
      >
        @for (option of maxNumberOptions; track option) {
          <option [value]="option">{{ option }}</option>
        }
      </select>
    </div>

    <button 
      class="px-6 py-3.5 border-none rounded-lg text-base font-semibold cursor-pointer transition-all duration-200 shadow-md bg-gradient-to-br from-indigo-500 to-purple-600 text-white hover:-translate-y-0.5 hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed active:translate-y-0" 
      (click)="onNewGame()"
      type="button"
    >
      Novo Jogo
    </button>

    <button 
      class="px-6 py-3.5 border-none rounded-lg text-base font-semibold cursor-pointer transition-all duration-200 shadow-md bg-gradient-to-br from-green-500 to-green-600 text-white hover:-translate-y-0.5 hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed active:translate-y-0" 
      (click)="onGenerateNumber()"
      [disabled]="!canGenerateNumber"
      type="button"
    >
      Gerar Número
    </button>

    <button 
      class="px-6 py-3.5 border-none rounded-lg text-base font-semibold cursor-pointer transition-all duration-200 shadow-md bg-gradient-to-br from-gray-500 to-gray-600 text-white hover:-translate-y-0.5 hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed active:translate-y-0 md:col-span-2" 
      (click)="onSaveGame()"
      type="button"
    >
      Salvar Jogo
    </button>
  </div>
</div>
