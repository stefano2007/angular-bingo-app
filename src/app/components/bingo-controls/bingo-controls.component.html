<div class="flex flex-col gap-6 w-full max-w-2xl mx-auto p-4 md:p-6 bg-white dark:bg-gray-800 rounded-xl shadow-lg">
  <div class="flex justify-between items-center flex-wrap gap-4">
    <h2 class="m-0 text-2xl font-semibold text-gray-900 dark:text-gray-100">Controles do Jogo</h2>
    @if (numeroAtual !== null) {
      <div class="flex items-center gap-2 px-4 md:px-6 py-3 bg-gradient-to-br from-indigo-500 to-purple-600 dark:from-indigo-600 dark:to-purple-700 rounded-lg text-white font-semibold shadow-md">
        <span class="text-sm opacity-90">Número Atual:</span>
        <span class="text-2xl font-bold">{{ numeroAtual }}</span>
      </div>
    }
  </div>

  <div class="flex flex-col gap-2">
    <div class="flex justify-between items-center text-sm text-gray-600 dark:text-gray-400">
      <span>Progresso: {{ quantidadeSelecionados }} / {{ totalNumeros }}</span>
      <span class="font-semibold text-gray-700 dark:text-gray-300">{{ porcentagemProgresso }}%</span>
    </div>
    <div class="w-full h-4 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
      <div 
        class="h-full bg-gradient-to-r from-green-500 to-green-600 dark:from-green-600 dark:to-green-700 transition-all duration-300 rounded-full"
        [style.width.%]="porcentagemProgresso"
      ></div>
    </div>
  </div>

  <div class="flex flex-col gap-2 md:col-span-2">
    <label for="numeroMaximoReadonly" class="text-sm font-medium text-gray-700 dark:text-gray-300">Número Máximo (Novo Jogo):</label>
    <input 
      id="numeroMaximoReadonly" 
      type="text"
      [value]="numeroMaximoSelecionado"
      readonly
      class="p-3 border-2 border-gray-200 dark:border-gray-600 rounded-lg text-base bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-gray-100 cursor-not-allowed"
    />
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <button 
      class="px-6 py-3.5 border-none rounded-lg text-base font-semibold cursor-pointer transition-all duration-200 shadow-md bg-gradient-to-br from-indigo-500 to-purple-600 dark:from-indigo-600 dark:to-purple-700 text-white hover:-translate-y-0.5 hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed active:translate-y-0" 
      (click)="aoNovoJogo()"
      type="button"
    >
      Novo Jogo
    </button>

    <button 
      class="px-6 py-3.5 border-none rounded-lg text-base font-semibold cursor-pointer transition-all duration-200 shadow-md bg-gradient-to-br from-green-500 to-green-600 dark:from-green-600 dark:to-green-700 text-white hover:-translate-y-0.5 hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed active:translate-y-0" 
      (click)="aoGerarNumero()"
      [disabled]="!podeGerarNumero"
      type="button"
    >
      Gerar Número
    </button>

    <button 
      class="px-6 py-3.5 border-none rounded-lg text-base font-semibold cursor-pointer transition-all duration-200 shadow-md bg-gradient-to-br from-gray-500 to-gray-600 dark:from-gray-600 dark:to-gray-700 text-white hover:-translate-y-0.5 hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed active:translate-y-0 md:col-span-2" 
      (click)="aoSalvarJogo()"
      type="button"
    >
      Salvar Jogo
    </button>
  </div>
</div>
