<div class="cartela">
  <h2 class="cartela-titulo">{{ bingoName }}</h2>
  <div class="cartela-corpo">
    @if (card) {
      @for (linha of obterCartelaOrganizada(); track $index) {
        <div class="cartela-linha">
          @for (numero of linha; track $index) {
            @if (numero === 0) {
              <div class="cartela-casa cartela-casa-img">
                @if (imageUrl) {
                  <img [src]="imageUrl" alt="BINGO" />
                } @else {
                  <img src="/bingo.png" alt="BINGO" />
                }
              </div>
            } @else {
              <div class="cartela-casa">
                {{ numero }}
              </div>
            }
          }
        </div>
      }
    }
  </div>
</div>
