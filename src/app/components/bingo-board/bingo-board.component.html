<div class="flex flex-col gap-4 w-full max-w-4xl mx-auto p-4 md:p-6 bg-white dark:bg-gray-800 rounded-xl shadow-lg">
  <div class="grid grid-cols-5 gap-2 mb-2">
    @for (letra of obterLetras(); track letra) {
      <div class="text-center text-2xl md:text-3xl font-bold text-white p-3 md:p-4 bg-gradient-to-br from-indigo-500 to-purple-600 dark:from-indigo-600 dark:to-purple-700 rounded-lg shadow-md">
        {{ letra }}
      </div>
    }
  </div>
  
  <div class="grid grid-cols-5 gap-2">
    @for (coluna of obterColunas(); track $index) {
      <div class="flex flex-col gap-2">
        @for (numero of coluna; track numero) {
          @if (estaSelecionado(numero)) {
            <div 
              class="aspect-square flex items-center justify-center text-lg md:text-xl font-bold rounded-lg transition-all duration-200 cursor-default border-2 bg-gradient-to-br from-green-500 to-green-600 dark:from-green-600 dark:to-green-700 border-green-700 dark:border-green-800 text-white shadow-lg scale-105 shadow-green-500/30"
            >
              {{ numero }}
            </div>
          } @else {
            <div 
              class="aspect-square flex items-center justify-center text-lg md:text-xl font-semibold rounded-lg transition-all duration-200 cursor-default border-2 bg-gray-100 dark:bg-gray-700 border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 hover:-translate-y-0.5 hover:shadow-md"
            >
              {{ numero }}
            </div>
          }
        }
      </div>
    }
  </div>
</div>
