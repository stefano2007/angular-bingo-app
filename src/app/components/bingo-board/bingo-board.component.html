<div class="flex flex-col gap-4 w-full max-w-4xl mx-auto p-4 md:p-6 bg-white rounded-xl shadow-lg">
  <div class="grid grid-cols-5 gap-2 mb-2">
    @for (letter of getLetters(); track letter) {
      <div class="text-center text-2xl md:text-3xl font-bold text-white p-3 md:p-4 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg shadow-md">
        {{ letter }}
      </div>
    }
  </div>
  
  <div class="grid grid-cols-5 gap-2">
    @for (column of getColumns(); track $index) {
      <div class="flex flex-col gap-2">
        @for (number of column; track number) {
          @if (isSelected(number)) {
            <div 
              class="aspect-square flex items-center justify-center text-lg md:text-xl font-bold rounded-lg transition-all duration-200 cursor-default border-2 bg-gradient-to-br from-green-500 to-green-600 border-green-700 text-white shadow-lg scale-105 shadow-green-500/30"
            >
              {{ number }}
            </div>
          } @else {
            <div 
              class="aspect-square flex items-center justify-center text-lg md:text-xl font-semibold rounded-lg transition-all duration-200 cursor-default border-2 bg-gray-100 border-gray-200 text-gray-700 hover:bg-gray-200 hover:-translate-y-0.5 hover:shadow-md"
            >
              {{ number }}
            </div>
          }
        }
      </div>
    }
  </div>
</div>
