<div
  class="flex flex-col gap-3 p-4 bg-gradient-to-br from-blue-50 to-indigo-50 dark:from-gray-700 dark:to-gray-700 rounded-lg border-2 border-blue-200 dark:border-blue-800">
  <div class="flex items-center gap-2 justify-center text-white font-semibold text-2xl ">
    <span class="opacity-90">Número Atual:</span>
    <span class="font-bold px-4 md:px-6 py-3 bg-gradient-to-br from-indigo-500 to-purple-600 dark:from-indigo-600 dark:to-purple-700 rounded-lg shadow-md">{{ numeroAtual ?? '-' }}</span>
  </div>
  <hr class="border-gray-300 dark:border-gray-600">
  <div class="flex justify-between items-center">
    <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100 m-0">Números Sorteados</h3>
    <span
      class="inline-flex items-center justify-center min-w-12 h-8 px-3 rounded-full bg-blue-500 dark:bg-blue-600 text-white text-sm font-bold">
      {{ numerosSelecionados.length }}
    </span>
  </div>
  <div class="flex flex-wrap gap-2">
    @for (numero of this.numerosSelecionados; track numero) {
    <div
      class="flex items-center justify-center w-12 h-12 rounded-lg font-bold text-sm transition-all duration-200 bg-gradient-to-br from-blue-500 to-blue-600 dark:from-blue-600 dark:to-blue-700 text-white shadow-md hover:shadow-lg hover:scale-110 shrink-0">
      {{ numero }}
    </div>
    }
  </div>
</div>
